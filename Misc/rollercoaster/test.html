<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rollercoaster Builder — self-test</title>
  <style>
    body { font-family: "Trebuchet MS", "Segoe UI", sans-serif; margin: 2rem; color: #15304d; background: #f4f9ff; }
    h1 { font-size: 1.4rem; margin: 0 0 0.2rem; }
    .sub { color: #55708d; margin: 0 0 1.2rem; font-size: 0.9rem; }
    #summary { padding: 0.7rem 1rem; border-radius: 10px; font-weight: 700; margin-bottom: 1rem; }
    .allpass { background: #d6f5e8; color: #0f5132; border: 1px solid #0d9488; }
    .anyfail { background: #fde2e2; color: #7a1f1f; border: 1px solid #c62828; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 0.35rem 0.6rem; border-bottom: 1px solid rgba(21,48,77,0.1); font-size: 0.88rem; }
    .pass::before { content: "PASS"; color: #0d9488; font-weight: 700; margin-right: 0.6rem; }
    .fail::before { content: "FAIL"; color: #c62828; font-weight: 700; margin-right: 0.6rem; }
    .fail { background: #fff4f4; }
    .detail { display: block; color: #7a1f1f; font-size: 0.8rem; margin-left: 3.2rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Rollercoaster Builder — geometry self-test</h1>
  <p class="sub">
    Checks the projection and track geometry. Open this after changing
    <code>iso.js</code> or <code>track.js</code>. Everything should say PASS.
  </p>
  <div id="summary">Running…</div>
  <ul id="results"></ul>

<script src="iso.js"></script>
<script src="track.js"></script>
<script src="physics.js"></script>
<script>
(function () {
  const RC = window.RC;
  const results = [];
  const EPS = 1e-9;

  function check(name, fn) {
    try {
      const problem = fn();
      results.push({ name, ok: !problem, detail: problem || '' });
    } catch (err) {
      results.push({ name, ok: false, detail: err.message + '\n' + err.stack });
    }
  }

  const near = (a, b, eps) => Math.abs(a - b) <= (eps || 1e-9);

  /* ---- projection ---------------------------------------------------- */
  check('rot / unrot round-trip, all rotations, continuous coords', () => {
    for (let r = 0; r < 4; r++) {
      for (let i = 0; i <= RC.GRID; i += 2.5) {
        for (let j = 0; j <= RC.GRID; j += 2.5) {
          const [a, b] = RC.rot(i, j, r);
          const [i2, j2] = RC.unrot(a, b, r);
          if (!near(i2, i) || !near(j2, j)) return `rot ${r}: (${i},${j}) -> (${i2},${j2})`;
        }
      }
    }
  });

  check('rotTile agrees with rot on tile corners', () => {
    for (let r = 0; r < 4; r++) {
      for (let i = 0; i < RC.GRID; i++) {
        for (let j = 0; j < RC.GRID; j++) {
          const [ra, rb] = RC.rotTile(i, j, r);
          const corners = [[i, j], [i + 1, j], [i + 1, j + 1], [i, j + 1]].map(c => RC.rot(c[0], c[1], r));
          const as = corners.map(c => c[0]), bs = corners.map(c => c[1]);
          if (Math.min(...as) !== ra || Math.max(...as) !== ra + 1 ||
              Math.min(...bs) !== rb || Math.max(...bs) !== rb + 1) {
            return `rot ${r}, tile (${i},${j}): rotTile=(${ra},${rb}) but corners span a[${Math.min(...as)},${Math.max(...as)}] b[${Math.min(...bs)},${Math.max(...bs)}]`;
          }
        }
      }
    }
  });

  check('screenToWorld inverts toScreen at ground level', () => {
    const view = { w: 1280, h: 720, dpr: 1 };
    const cam = { zoom: 1.37, panX: -40, panY: 25, rot: 0 };
    for (let r = 0; r < 4; r++) {
      cam.rot = r;
      for (let i = 0; i <= RC.GRID; i += 3) {
        for (let j = 0; j <= RC.GRID; j += 3) {
          const s = RC.toScreen(i, j, 0, cam, view);
          const [i2, j2] = RC.screenToWorld(s.x, s.y, cam, view);
          if (!near(i2, i, 1e-6) || !near(j2, j, 1e-6)) {
            return `rot ${r}: (${i},${j}) -> screen -> (${i2.toFixed(4)},${j2.toFixed(4)})`;
          }
        }
      }
    }
  });

  /* ---- piece geometry -------------------------------------------------
     The critical invariant: a piece's declared exit node must sit exactly
     where its drawn centreline ends. If these drift, track looks connected
     but the physics path has gaps in it. */
  check('exit node matches centreline end, every piece, every direction', () => {
    for (const def of RC.PIECES) {
      for (let dir = 0; dir < 4; dir++) {
        const node = { i: 9, j: 9, dir, k: 12, g: def.gIn };
        const exit = RC.exitNode(def, node);
        const end = RC.centreline(def, node, 1);
        const ep = RC.entryPoint(exit);
        if (!near(ep.x, end.x, 1e-9) || !near(ep.y, end.y, 1e-9)) {
          return `${def.id} dir ${dir}: centreline ends (${end.x},${end.y}) but exit entry point is (${ep.x},${ep.y})`;
        }
        if (!near(exit.k, end.z, 1e-9)) {
          return `${def.id} dir ${dir}: exit k=${exit.k} but centreline z=${end.z}`;
        }
      }
    }
  });

  check('centreline starts at the entry node', () => {
    for (const def of RC.PIECES) {
      for (let dir = 0; dir < 4; dir++) {
        const node = { i: 7, j: 5, dir, k: 4, g: def.gIn };
        const start = RC.centreline(def, node, 0);
        const ep = RC.entryPoint(node);
        if (!near(start.x, ep.x) || !near(start.y, ep.y) || !near(start.z, node.k)) {
          return `${def.id} dir ${dir}: starts (${start.x},${start.y},${start.z}) not (${ep.x},${ep.y},${node.k})`;
        }
      }
    }
  });

  check('every piece has an integer height change', () => {
    for (const def of RC.PIECES) {
      if (!Number.isInteger(def.dH)) return `${def.id} dH = ${def.dH}`;
    }
  });

  check('turn exit nodes land on integer tiles', () => {
    for (const def of RC.PIECES) {
      if (def.kind !== 'turn') continue;
      for (let dir = 0; dir < 4; dir++) {
        const node = { i: 9, j: 9, dir, k: 0, g: 0 };
        const e = RC.exitNode(def, node);
        if (!Number.isInteger(e.i) || !Number.isInteger(e.j)) {
          return `${def.id} dir ${dir}: exit tile (${e.i},${e.j})`;
        }
      }
    }
  });

  check('slope is continuous across a piece (ends match gIn/gOut)', () => {
    const h = 1e-5;
    for (const def of RC.PIECES) {
      if (def.kind !== 'straight') continue;
      const node = { i: 9, j: 9, dir: 0, k: 20, g: def.gIn };
      // dz/dt at the ends, converted to levels per tile.
      const z0 = RC.centreline(def, node, 0).z;
      const z1 = RC.centreline(def, node, h).z;
      const za = RC.centreline(def, node, 1 - h).z;
      const zb = RC.centreline(def, node, 1).z;
      const gStart = (z1 - z0) / h / def.L;
      const gEnd = (zb - za) / h / def.L;
      if (!near(gStart, def.gIn, 1e-3)) return `${def.id}: entry slope ${gStart.toFixed(4)} != ${def.gIn}`;
      if (!near(gEnd, def.gOut, 1e-3)) return `${def.id}: exit slope ${gEnd.toFixed(4)} != ${def.gOut}`;
    }
  });

  check('centreline height is monotonic within a piece', () => {
    for (const def of RC.PIECES) {
      if (def.dH === 0) continue;
      const node = { i: 9, j: 9, dir: 0, k: 20, g: def.gIn };
      const sign = Math.sign(def.dH);
      let prev = RC.centreline(def, node, 0).z;
      for (let s = 1; s <= 40; s++) {
        const z = RC.centreline(def, node, s / 40).z;
        if ((z - prev) * sign < -1e-9) return `${def.id} dips at t=${(s / 40).toFixed(2)}`;
        prev = z;
      }
    }
  });

  /* ---- building -------------------------------------------------------- */
  check('four same-radius turns return to the starting node', () => {
    for (const id of ['turn-left-tight', 'turn-right-tight', 'turn-left-wide', 'turn-right-wide']) {
      RC.track.pieces = [];
      RC.track.start = { i: 20, j: 20, dir: 0, k: 0, g: 0 };
      RC.track.head = Object.assign({}, RC.track.start);
      RC.version++;
      for (let n = 0; n < 4; n++) {
        if (!RC.place(id)) return `${id}: placement ${n + 1} was rejected`;
      }
      if (!RC.sameNode(RC.track.head, RC.track.start)) {
        const h = RC.track.head, s = RC.track.start;
        return `${id}: ended at (${h.i},${h.j},dir ${h.dir},k ${h.k}) not (${s.i},${s.j},dir ${s.dir},k ${s.k})`;
      }
    }
  });

  check('a hill returns to its starting height', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 4, j: 20, dir: 0, k: 0, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    const seq = ['flat-to-gentle-up', 'gentle-up', 'gentle-up-to-flat', 'flat',
                 'flat-to-gentle-down', 'gentle-down', 'gentle-down-to-flat'];
    for (const id of seq) {
      if (!RC.place(id)) return `${id} was rejected (head slope ${RC.track.head.g})`;
    }
    if (RC.track.head.k !== 0) return `ended at height ${RC.track.head.k}, expected 0`;
    if (RC.track.head.g !== 0) return `ended on slope ${RC.track.head.g}, expected flat`;
  });

  check('a full rectangular circuit closes and is reported as closed', () => {
    RC.resetTrack();                       // 3 station pieces from (4,9) heading +i
    // Four quarter turns cancel exactly, so the straights alone must carry the
    // head from (7,9) back to the start at (4,9) — a displacement of (-3, 0).
    // Hence the -i side is 3 longer than the +i side and the two j sides match.
    // Kept small so the turns' 2.5-tile radius stays inside the 20x20 park.
    const sides = [2, 2, 5, 2];
    for (let side = 0; side < 4; side++) {
      for (let s = 0; s < sides[side]; s++) {
        const why = RC.canPlace(RC.pieceDef('flat'), RC.track.head).why;
        if (!RC.place('flat')) return `side ${side}, straight ${s + 1}: ${why}`;
      }
      const why = RC.canPlace(RC.pieceDef('turn-right-wide'), RC.track.head).why;
      if (!RC.place('turn-right-wide')) {
        const h = RC.track.head;
        return `side ${side} turn at (${h.i},${h.j},dir ${h.dir}): ${why}`;
      }
    }
    const st = RC.circuitStatus();
    if (st.kind !== 'closed') {
      const h = RC.track.head, s = RC.track.start;
      return `status "${st.kind}" — head (${h.i},${h.j},dir ${h.dir},k ${h.k}) vs start (${s.i},${s.j},dir ${s.dir},k ${s.k})`;
    }
  });

  check('undo restores the previous head exactly', () => {
    RC.resetTrack();
    const before = Object.assign({}, RC.track.head);
    RC.place('flat-to-gentle-up');
    RC.place('gentle-up');
    RC.undo();
    RC.undo();
    if (!RC.sameNode(RC.track.head, before)) {
      const h = RC.track.head;
      return `head (${h.i},${h.j},dir ${h.dir},k ${h.k},g ${h.g}) != (${before.i},${before.j},dir ${before.dir},k ${before.k},g ${before.g})`;
    }
    if (RC.track.pieces.length !== 3) return `${RC.track.pieces.length} pieces left, expected 3 station pieces`;
  });

  check('pieces are refused when their entry slope does not match', () => {
    RC.resetTrack();                        // head is flat
    if (RC.canPlace(RC.pieceDef('gentle-up'), RC.track.head).ok) {
      return 'gentle-up was allowed straight off a flat head';
    }
    if (RC.canPlace(RC.pieceDef('steep-up'), RC.track.head).ok) {
      return 'steep-up was allowed straight off a flat head';
    }
    if (!RC.canPlace(RC.pieceDef('flat-to-gentle-up'), RC.track.head).ok) {
      return 'flat-to-gentle-up was refused from a flat head';
    }
  });

  check('track cannot be built below ground or off the park', () => {
    RC.resetTrack();
    RC.place('flat-to-gentle-down');
    if (RC.track.pieces.length !== 3) return 'a downhill piece was accepted at ground level';
    RC.resetTrack();
    let placed = 0;
    for (let n = 0; n < 40; n++) if (RC.place('flat')) placed++;
    if (placed >= 40) return 'ran off the edge of the park without being stopped';
  });

  /* ---- collision -------------------------------------------------------
     The risk here is false positives: a collision rule that is too eager
     silently refuses ordinary shapes and makes the builder feel broken. */
  check('an S-bend is allowed (adjacent turns are not a collision)', () => {
    RC.resetTrack();
    if (!RC.place('turn-right-tight')) return 'first turn refused';
    if (!RC.place('turn-left-tight')) {
      return 'S-bend refused: ' + RC.canPlace(RC.pieceDef('turn-left-tight'), RC.track.head).why;
    }
  });

  check('a U-turn is allowed (two turns the same way)', () => {
    RC.resetTrack();
    if (!RC.place('turn-right-tight')) return 'first turn refused';
    if (!RC.place('turn-right-tight')) {
      return 'U-turn refused: ' + RC.canPlace(RC.pieceDef('turn-right-tight'), RC.track.head).why;
    }
  });

  check('a long straight run is allowed', () => {
    RC.resetTrack();
    for (let n = 0; n < 12; n++) {
      if (!RC.place('flat')) return `straight ${n + 1} refused: ` +
        RC.canPlace(RC.pieceDef('flat'), RC.track.head).why;
    }
  });

  check('track may cross over itself with clearance', () => {
    RC.resetTrack();                       // stations on j=19 at ground level
    const seq = []
      .concat(['flat', 'flat'])
      .concat(['flat-to-gentle-up', 'gentle-up', 'gentle-up', 'gentle-up',
               'gentle-up', 'gentle-up', 'gentle-up-to-flat'])   // up to k = 12
      .concat(['turn-right-tight', 'turn-right-tight'])          // now heading -i
      .concat(new Array(10).fill('flat'))                        // back along j = 22
      .concat(['turn-right-tight'])                              // now heading -j
      .concat(['flat', 'flat', 'flat']);   // the middle one crosses over (16,19)
    for (const id of seq) {
      const why = RC.canPlace(RC.pieceDef(id), RC.track.head).why;
      if (!RC.place(id)) {
        const h = RC.track.head;
        return `${id} refused at (${h.i},${h.j},dir ${h.dir},k ${h.k}): ${why}`;
      }
    }
    if (RC.track.head.k !== 12) return `expected to finish at 12 m, got ${RC.track.head.k}`;
  });

  check('track may not be built back through itself', () => {
    // No station here: a four-turn loop at ground level would otherwise be
    // refused for running through the station, which is correct behaviour.
    RC.track.pieces = [];
    RC.track.start = { i: 9, j: 9, dir: 0, k: 0, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (let n = 0; n < 4; n++) {
      if (!RC.place('turn-right-tight')) {
        return `turn ${n + 1} refused while closing the loop: ` +
          RC.canPlace(RC.pieceDef('turn-right-tight'), RC.track.head).why;
      }
    }
    // The head is back at the start, so a fifth turn would retrace the first.
    if (RC.canPlace(RC.pieceDef('turn-right-tight'), RC.track.head).ok) {
      return 'a piece was allowed to retrace track already built';
    }
  });

  /* ---- arc-length path -------------------------------------------------- */
  check('path is continuous and its length matches the pieces', () => {
    RC.resetTrack();
    for (const id of ['flat', 'flat-to-gentle-up', 'gentle-up', 'gentle-up-to-flat', 'turn-right-wide']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    const path = RC.trackPath();
    if (path.pts.length < 10) return `only ${path.pts.length} path points`;
    if (!near(path.pts[0].s, 0)) return `path starts at s=${path.pts[0].s}`;

    for (let n = 1; n < path.pts.length; n++) {
      const a = path.pts[n - 1], b = path.pts[n];
      if (b.s < a.s) return `distance goes backwards at point ${n}`;
      const gap = Math.hypot((b.x - a.x) * RC.TILE_M, (b.y - a.y) * RC.TILE_M, (b.z - a.z) * RC.LEVEL_M);
      if (gap > 2.0) return `gap of ${gap.toFixed(2)} m between points ${n - 1} and ${n}`;
      if (!near(b.s - a.s, gap, 1e-9)) return `s increment ${(b.s - a.s).toFixed(6)} != step ${gap.toFixed(6)}`;
    }
    if (path.total < 15) return `total length ${path.total.toFixed(1)} m looks too short`;
  });

  check('path cache refreshes when the track changes', () => {
    RC.resetTrack();
    const before = RC.trackPath().total;
    RC.place('flat');
    const after = RC.trackPath().total;
    if (!(after > before)) return `length did not grow: ${before} -> ${after}`;
    RC.undo();
    const back = RC.trackPath().total;
    if (!near(back, before, 1e-9)) return `after undo ${back} != ${before}`;
  });

  check('a placed piece reports a sensible length', () => {
    const flat = RC.pieceDef('flat');
    if (!near(RC.pieceLength(flat), RC.TILE_M, 1e-6)) {
      return `flat piece is ${RC.pieceLength(flat)} m, expected ${RC.TILE_M}`;
    }
    const wide = RC.pieceDef('turn-right-wide');
    const expect = 2.5 * RC.TILE_M * Math.PI / 2;
    if (!near(RC.pieceLength(wide), expect, 1e-6)) {
      return `wide turn is ${RC.pieceLength(wide)} m, expected ${expect.toFixed(3)}`;
    }
  });

  check('arc gap takes the short way round a closed circuit', () => {
    RC.resetTrack();
    if (!RC.completeTrack().ok) return 'could not build a closed circuit';
    const total = RC.trackPath().total;

    // Open track: plain absolute difference.
    if (!near(RC.arcGap(10, 4, false), 6, 1e-9)) return 'open gap should be 6';
    if (!near(RC.arcGap(4, 10, false), 6, 1e-9)) return 'open gap should be symmetric';

    // Closed: a point just past the start line is near one just before it.
    const gap = RC.arcGap(1, total - 1, true);
    if (!near(gap, 2, 1e-6)) {
      return `across the start line the gap is ${gap.toFixed(3)} m, expected 2`;
    }
    // Never more than half a lap.
    for (let a = 0; a < total; a += total / 13) {
      for (let b = 0; b < total; b += total / 7) {
        const d = RC.arcGap(a, b, true);
        if (d < -1e-9 || d > total / 2 + 1e-6) {
          return `gap ${d.toFixed(2)} m between ${a.toFixed(1)} and ${b.toFixed(1)} ` +
                 `is outside [0, ${(total / 2).toFixed(1)}]`;
        }
      }
    }
  });

  /* ---- construction UI's piece resolution -------------------------------
     The build window picks pieces by looking up "entry slope > exit slope".
     That only works if the piece table covers every reachable pair exactly
     once, which is a property of the data, not of the UI. */
  function straightMap() {
    const m = new Map();
    for (const def of RC.PIECES) {
      if (def.kind !== 'straight') continue;
      if (def.station || def.brake || def.launch) continue;
      const key = def.gIn + '>' + def.gOut;
      if (m.has(key)) return { dupe: key, a: m.get(key).id, b: def.id };
      m.set(key, def);
    }
    return m;
  }

  check('slope pairs resolve to exactly one piece each', () => {
    const m = straightMap();
    if (m.dupe) return `two pieces claim "${m.dupe}": ${m.a} and ${m.b}`;
    // Every slope must at least be able to hold itself.
    for (const g of [-6, -2, 0, 2, 6]) {
      if (!m.has(g + '>' + g)) return `no piece holds slope ${g}`;
    }
  });

  check('every slope can be reached from level in single steps', () => {
    const m = straightMap();
    if (m.dupe) return 'duplicate mapping';
    // Walking outwards from level, each step changes slope by one grade.
    const chains = [[0, 2, 6], [0, -2, -6]];
    for (const chain of chains) {
      for (let n = 0; n + 1 < chain.length; n++) {
        const up = chain[n] + '>' + chain[n + 1];
        const down = chain[n + 1] + '>' + chain[n];
        if (!m.has(up)) return `no piece goes from slope ${chain[n]} to ${chain[n + 1]}`;
        if (!m.has(down)) return `no way back from slope ${chain[n + 1]} to ${chain[n]}`;
      }
    }
  });

  check('holding a slope selection walks up through the transitions', () => {
    // This is the behaviour the build window depends on: pick "steep up" and
    // press build repeatedly, and the track should climb 0 -> gentle -> steep
    // without the student ever naming a transition piece.
    const m = straightMap();
    RC.resetTrack();
    const target = 6;
    const seen = [];
    for (let n = 0; n < 4; n++) {
      const g = RC.track.head.g;
      const def = m.get(g + '>' + target) || m.get(g + '>' + (g < 2 ? 2 : target));
      if (!def) return `stuck at slope ${g} with no piece toward ${target}`;
      if (!RC.place(def.id)) return `${def.id} refused at slope ${g}`;
      seen.push(RC.track.head.g);
    }
    if (seen[0] !== 2) return `first build left slope ${seen[0]}, expected gentle (2)`;
    if (seen[1] !== 6) return `second build left slope ${seen[1]}, expected steep (6)`;
    if (seen[2] !== 6) return `third build left slope ${seen[2]}, expected to hold steep`;
  });

  /* ---- finish track ----------------------------------------------------- */
  check('finish track closes a circuit from the bare station', () => {
    RC.resetTrack();
    const res = RC.completeTrack();
    if (!res.ok) return res.why;
    const st = RC.circuitStatus();
    if (st.kind !== 'closed') return `status is "${st.kind}" after finishing`;
    if (!RC.sameNode(RC.track.head, RC.track.start)) return 'head is not back at the start';
  });

  check('finish track closes a circuit after a lift hill and drop', () => {
    RC.resetTrack();
    const seq = ['flat-to-gentle-up', 'gentle-up', 'gentle-up', 'gentle-up-to-flat',
                 'flat', 'flat-to-gentle-down', 'gentle-down', 'gentle-down',
                 'gentle-down-to-flat'];
    for (const id of seq) {
      if (!RC.place(id, { lift: true })) return `${id} refused`;
    }
    const res = RC.completeTrack();
    if (!res.ok) return res.why;
    if (RC.circuitStatus().kind !== 'closed') return 'circuit did not close';
  });

  check('finish track leaves every piece legal and connected', () => {
    RC.resetTrack();
    for (const id of ['flat-to-gentle-up', 'gentle-up', 'gentle-up-to-flat',
                      'turn-right-wide', 'flat', 'flat']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    if (!RC.completeTrack().ok) return 'could not finish';

    // Walk the whole chain: each piece must start exactly where the last ended.
    const pieces = RC.track.pieces;
    let node = RC.track.start;
    for (let n = 0; n < pieces.length; n++) {
      if (!RC.sameNode(pieces[n].node, node)) {
        return `piece ${n} (${pieces[n].defId}) starts at (${pieces[n].node.i},` +
               `${pieces[n].node.j},dir ${pieces[n].node.dir},k ${pieces[n].node.k}) ` +
               `but the previous piece ended at (${node.i},${node.j},dir ${node.dir},k ${node.k})`;
      }
      node = RC.exitNode(RC.pieceDef(pieces[n].defId), node);
    }
    if (!RC.sameNode(node, RC.track.start)) return 'the chain does not return to the start';
  });

  check('finish track refuses when the circuit is already closed', () => {
    RC.resetTrack();
    if (!RC.completeTrack().ok) return 'could not finish the first time';
    const again = RC.completeTrack();
    if (again.ok) return 'it claimed to finish an already-closed circuit';
  });

  check('finish track rolls back cleanly when it cannot find a route', () => {
    RC.resetTrack();
    const before = RC.track.pieces.length;
    // A tiny expansion budget makes the search give up.
    const res = RC.completeTrack({ maxExpand: 1 });
    if (res.ok) return 'expected the search to give up with a budget of 1';
    if (RC.track.pieces.length !== before) {
      return `left ${RC.track.pieces.length - before} pieces behind after failing`;
    }
  });

  /* ---- physics ---------------------------------------------------------
     The invariant the whole sim exists to teach: KE + PE + thermal must
     equal the energy it started with plus whatever the motor put in. If
     this drifts, the energy bars are lying to students. */

  /* A closed circuit with a lift hill and a drop, for the physics checks. */
  function buildTestCircuit() {
    RC.resetTrack();
    const seq = ['flat-to-gentle-up', 'gentle-up', 'gentle-up', 'gentle-up-to-flat',
                 'flat', 'flat-to-gentle-down', 'gentle-down', 'gentle-down',
                 'gentle-down-to-flat', 'flat', 'flat'];
    for (const id of seq) {
      if (!RC.place(id, { lift: true })) return `${id} refused: ` +
        RC.canPlace(RC.pieceDef(id), RC.track.head).why;
    }
    return null;
  }

  function runFor(seconds) {
    RC.sim.state = 'running';
    const dt = 1 / 240;
    for (let n = 0; n < seconds * 240 && RC.sim.state === 'running'; n++) {
      RC.stepSim(dt);
    }
  }

  check('energy is conserved on a frictionless run', () => {
    const err = buildTestCircuit();
    if (err) return err;
    RC.sim.cars = 3;
    RC.sim.friction = false;
    RC.resetSim(13);          // lead car onto the lift, or nothing ever moves
    const e0 = RC.energy();
    runFor(8);
    const e = RC.energy();
    const drift = Math.abs(e.total - e.supplied);
    const scale = Math.max(1, e.supplied);
    if (drift / scale > 0.01) {
      return `total ${e.total.toFixed(1)} J vs supplied ${e.supplied.toFixed(1)} J ` +
             `(drift ${(100 * drift / scale).toFixed(2)}%), started at ${e0.total.toFixed(1)} J`;
    }
  });

  check('energy is conserved with friction on (losses go to thermal)', () => {
    const err = buildTestCircuit();
    if (err) return err;
    RC.sim.cars = 3;
    RC.sim.friction = true;
    RC.resetSim(13);
    runFor(8);
    const e = RC.energy();
    const drift = Math.abs(e.total - e.supplied);
    const scale = Math.max(1, e.supplied);
    if (drift / scale > 0.01) {
      return `total ${e.total.toFixed(1)} J vs supplied ${e.supplied.toFixed(1)} J ` +
             `(drift ${(100 * drift / scale).toFixed(2)}%)`;
    }
    if (e.thermal <= 0) return 'friction was on but no thermal energy accumulated';
    RC.sim.friction = false;
  });

  check('a train released on a slope accelerates downhill', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 20, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (const id of ['flat-to-gentle-down', 'gentle-down', 'gentle-down', 'gentle-down']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    RC.sim.cars = 1;
    RC.sim.friction = false;
    // Start past the transition piece, on constant gentle-down, so the
    // comparison against a = g*sin(theta) is against a constant slope.
    RC.resetSim(5);
    runFor(1.5);
    if (RC.sim.v <= 0) return `speed is ${RC.sim.v.toFixed(2)} m/s, expected positive`;
    // Gentle is 2 levels per 4 m tile, so sin(theta) = 2/sqrt(4^2 + 2^2).
    const expected = 9.81 * (2 / Math.sqrt(4 * 4 + 2 * 2)) * 1.5;
    if (Math.abs(RC.sim.v - expected) / expected > 0.25) {
      return `after 1.5 s v = ${RC.sim.v.toFixed(2)} m/s, expected roughly ${expected.toFixed(2)}`;
    }
  });

  check('gravity converts potential energy into kinetic', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 20, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (const id of ['flat-to-gentle-down', 'gentle-down', 'gentle-down',
                      'gentle-down', 'gentle-down-to-flat']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    RC.sim.cars = 1;
    RC.sim.friction = false;
    RC.resetSim(0);
    const start = RC.energy();
    runFor(2);                // stop short of the end, which would zero v
    const end = RC.energy();
    if (!(end.ke > start.ke)) return 'kinetic energy did not increase';
    if (!(end.pe < start.pe)) return 'potential energy did not decrease';
    const gained = end.ke - start.ke, lost = start.pe - end.pe;
    if (Math.abs(gained - lost) / Math.max(1, lost) > 0.01) {
      return `KE gained ${gained.toFixed(1)} J but PE lost ${lost.toFixed(1)} J`;
    }
  });

  check('the chain lift is booked as motor energy', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 0, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (const id of ['flat-to-gentle-up', 'gentle-up', 'gentle-up', 'gentle-up']) {
      if (!RC.place(id, { lift: true })) return `${id} refused`;
    }
    RC.sim.cars = 1;
    RC.sim.friction = false;
    RC.resetSim(0);
    runFor(2);
    if (RC.sim.eMotor <= 0) return 'the lift did no work';
    const e = RC.energy();
    if (Math.abs(e.total - e.supplied) / Math.max(1, e.supplied) > 0.01) {
      return `total ${e.total.toFixed(1)} J vs supplied ${e.supplied.toFixed(1)} J`;
    }
    // Without the lift the train would simply have rolled back down.
    if (RC.sim.v <= 0) return `train is not climbing: v = ${RC.sim.v.toFixed(2)}`;
  });

  check('a train that cannot crest a hill rolls back', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 6, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    // A dip, then a hill far too tall to climb from rest.
    for (const id of ['flat-to-gentle-down', 'gentle-down', 'gentle-down-to-flat', 'flat',
                      'flat-to-gentle-up', 'gentle-up', 'gentle-up', 'gentle-up',
                      'gentle-up', 'gentle-up']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    RC.sim.cars = 1;
    RC.sim.friction = false;
    // Released partway down, so it can never climb back to s = 0 and trip
    // the end-of-track stop instead of oscillating in the dip.
    RC.resetSim(6);
    runFor(30);
    if (RC.sim.maxZ * 1 > 20) return 'train somehow climbed the hill';
    if (RC.sim.reversals < 2) {
      return `expected the train to roll back and forth, saw ${RC.sim.reversals} reversals`;
    }
  });

  check('a completed lap returns the train to its berth', () => {
    RC.resetTrack();
    // Lift hill up 6 m, drop back to ground, then plain filler round to the
    // station. Frictionless, so the train coasts the filler at constant speed.
    const seq = ['flat-to-gentle-up', 'gentle-up', 'gentle-up', 'gentle-up-to-flat',
                 'flat-to-gentle-down', 'gentle-down', 'gentle-down', 'gentle-down-to-flat'];
    for (const id of seq) {
      if (!RC.place(id, { lift: true })) return `${id} refused`;
    }
    if (RC.track.head.k !== 0) return `drop did not return to ground (k = ${RC.track.head.k})`;
    const fin = RC.completeTrack();
    if (!fin.ok) return 'could not finish the circuit: ' + fin.why;
    if (RC.circuitStatus().kind !== 'closed') return 'circuit is not closed';

    RC.sim.cars = 4;
    RC.sim.friction = false;
    RC.resetSim();
    const berth = RC.sim.startS;
    runFor(120);

    if (RC.sim.state !== 'finished') {
      return `state is "${RC.sim.state}" after 120 s (s = ${RC.sim.s.toFixed(1)}, ` +
             `v = ${RC.sim.v.toFixed(2)}, note "${RC.sim.note}")`;
    }
    if (!near(RC.sim.s, berth, 1e-6)) {
      return `stopped at s = ${RC.sim.s.toFixed(2)} m, berth is ${berth.toFixed(2)} m`;
    }
    if (!near(RC.sim.v, 0, 1e-9)) return `stopped with v = ${RC.sim.v}`;

    // Braking to a stand is a real energy sink, so the books must still balance.
    const e = RC.energy();
    if (Math.abs(e.total - e.supplied) / Math.max(1, e.supplied) > 0.01) {
      return `total ${e.total.toFixed(1)} J vs supplied ${e.supplied.toFixed(1)} J`;
    }
  });

  /* ---- g-forces --------------------------------------------------------- */
  check('standing still on level track is 1 g vertical and nothing else', () => {
    RC.resetTrack();
    const p = RC.pathAt(6, false);
    const g = RC.gForces(p, 0, 0);
    if (!near(g.vert, 1, 1e-6)) return `vertical is ${g.vert.toFixed(4)}, expected 1`;
    if (!near(g.lat, 0, 1e-6)) return `lateral is ${g.lat.toFixed(4)}, expected 0`;
    if (!near(g.long, 0, 1e-6)) return `longitudinal is ${g.long.toFixed(4)}, expected 0`;
  });

  check('standing on a slope splits gravity into vertical and fore-aft', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 20, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (const id of ['flat-to-gentle-down', 'gentle-down', 'gentle-down']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    const p = RC.pathAt(6.5, false);          // on the constant gentle grade
    const sinT = 2 / Math.sqrt(4 * 4 + 2 * 2);
    const cosT = 4 / Math.sqrt(4 * 4 + 2 * 2);
    if (!near(Math.abs(p.dzds), sinT, 1e-3)) {
      return `expected to be on the gentle grade, dzds = ${p.dzds.toFixed(4)}`;
    }
    const g = RC.gForces(p, 0, 0);
    if (!near(g.vert, cosT, 2e-3)) return `vertical is ${g.vert.toFixed(4)}, expected ${cosT.toFixed(4)}`;
    if (!near(g.lat, 0, 1e-6)) return `lateral is ${g.lat.toFixed(4)} on a straight slope`;
    // On a downhill the restraint holds the rider back, so fore-aft is negative.
    if (!near(g.long, -sinT, 2e-3)) return `fore-aft is ${g.long.toFixed(4)}, expected ${(-sinT).toFixed(4)}`;
    // The three components must account for exactly 1 g of gravity.
    const mag = Math.hypot(g.vert, g.lat, g.long);
    if (!near(mag, 1, 2e-3)) return `total specific force is ${mag.toFixed(4)} g, expected 1`;
  });

  check('an unbanked turn puts v^2/r sideways and leaves vertical at 1 g', () => {
    RC.resetTrack();
    if (!RC.place('turn-right-tight')) return 'turn refused';
    const path = RC.trackPath();
    // Midpoint of the turn, clear of the joints.
    const turnStart = path.pts.find(p => p.def.kind === 'turn').s;
    const p = RC.pathAt(turnStart + 4, false);
    if (p.def.kind !== 'turn') return 'sample landed off the turn';

    const v = 10;
    const R = 1.5 * RC.TILE_M;                 // tight turn radius, 6 m
    const expect = v * v / (R * 9.81);
    const g = RC.gForces(p, v, 0);

    if (!near(g.vert, 1, 5e-3)) return `vertical is ${g.vert.toFixed(4)} on a flat turn, expected 1`;
    if (Math.abs(Math.abs(g.lat) - expect) / expect > 0.05) {
      return `lateral is ${Math.abs(g.lat).toFixed(3)} g, expected about ${expect.toFixed(3)}`;
    }
  });

  check('turn direction sets the sign of the lateral force', () => {
    const sample = id => {
      RC.resetTrack();
      RC.place(id);
      const path = RC.trackPath();
      const turnStart = path.pts.find(p => p.def.kind === 'turn').s;
      return RC.gForces(RC.pathAt(turnStart + 4, false), 10, 0).lat;
    };
    const right = sample('turn-right-tight');
    const left = sample('turn-left-tight');
    if (!(right > 0)) return `a right turn gave lateral ${right.toFixed(3)}, expected positive`;
    if (!(left < 0)) return `a left turn gave lateral ${left.toFixed(3)}, expected negative`;
    if (!near(Math.abs(right), Math.abs(left), 1e-6)) {
      return `mirror turns disagree: ${right.toFixed(4)} vs ${left.toFixed(4)}`;
    }
  });

  /* ---- banking ----------------------------------------------------------- */
  function bankedTurnSample(id, banked, sOffset) {
    RC.resetTrack();
    RC.place(id, { bank: banked });
    const path = RC.trackPath();
    const turnStart = path.pts.find(p => p.def.kind === 'turn').s;
    return RC.pathAt(turnStart + (sOffset == null ? 4 : sOffset), false);
  }

  check('banked pieces still start and finish level', () => {
    // The whole reason bank never became part of the node state: a banked
    // turn must join level track at both ends.
    RC.resetTrack();
    RC.place('turn-right-tight', { bank: true });
    RC.place('flat');
    const pts = RC.trackPath().pts;
    const turn = pts.filter(p => p.def.kind === 'turn');
    if (!turn.length) return 'no turn in the path';
    if (!near(turn[0].bank, 0, 1e-9)) return `turn starts banked at ${turn[0].bank}`;
    if (!near(turn[turn.length - 1].bank, 0, 1e-9)) {
      return `turn ends banked at ${turn[turn.length - 1].bank}`;
    }
    const peak = Math.max(...turn.map(p => Math.abs(p.bank)));
    if (!near(peak, RC.BANK_ANGLE, 1e-9)) {
      return `peak bank is ${(peak * 180 / Math.PI).toFixed(1)} deg, expected 45`;
    }
    for (const p of pts) {
      if (p.def.kind !== 'turn' && !near(p.bank, 0, 1e-9)) {
        return 'straight track picked up a bank angle';
      }
    }
  });

  check('the frame stays orthonormal when banked', () => {
    const p = bankedTurnSample('turn-right-tight', true);
    const fr = RC.carFrame(p);
    const dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z;
    const len = a => Math.hypot(a.x, a.y, a.z);
    for (const [name, v] of [['f', fr.f], ['r', fr.r], ['u', fr.u]]) {
      if (!near(len(v), 1, 1e-9)) return `${name} is not unit length (${len(v).toFixed(6)})`;
    }
    if (!near(dot(fr.f, fr.r), 0, 1e-9)) return 'f and r not perpendicular';
    if (!near(dot(fr.f, fr.u), 0, 1e-9)) return 'f and u not perpendicular';
    if (!near(dot(fr.r, fr.u), 0, 1e-9)) return 'r and u not perpendicular';
    // Rolled 45 degrees, so "right" now has a downward component.
    if (!(fr.r.z < -0.5)) return `banked right vector should tilt down, z = ${fr.r.z.toFixed(3)}`;
    if (!(fr.u.z > 0.5 && fr.u.z < 0.8)) return `banked up vector z = ${fr.u.z.toFixed(3)}, expected about 0.707`;
  });

  check('banking a turn trades lateral g for vertical g', () => {
    // The point of the whole feature, and what RCT teaches by feel.
    const v = 10;
    const flat = RC.gForces(bankedTurnSample('turn-right-tight', false), v, 0);
    const banked = RC.gForces(bankedTurnSample('turn-right-tight', true), v, 0);

    if (!(Math.abs(banked.lat) < Math.abs(flat.lat) * 0.5)) {
      return `banking barely helped: ${Math.abs(flat.lat).toFixed(2)} g flat vs ` +
             `${Math.abs(banked.lat).toFixed(2)} g banked`;
    }
    if (!(banked.vert > flat.vert)) {
      return `vertical should rise when banked: ${flat.vert.toFixed(2)} -> ${banked.vert.toFixed(2)}`;
    }
    // The total force on the rider is unchanged — banking only redirects it.
    const magFlat = Math.hypot(flat.vert, flat.lat, flat.long);
    const magBank = Math.hypot(banked.vert, banked.lat, banked.long);
    if (Math.abs(magFlat - magBank) / magFlat > 0.02) {
      return `total force changed: ${magFlat.toFixed(3)} g flat vs ${magBank.toFixed(3)} g banked`;
    }
  });

  check('at the ideal speed a 45 degree bank cancels lateral g entirely', () => {
    // tan(theta) = v^2 / (r g), so at 45 degrees the ideal speed is v = sqrt(r g).
    const R = 1.5 * RC.TILE_M;                  // tight turn, 6 m
    const vIdeal = Math.sqrt(R * 9.81 * Math.tan(RC.BANK_ANGLE));
    const g = RC.gForces(bankedTurnSample('turn-right-tight', true), vIdeal, 0);

    if (Math.abs(g.lat) > 0.05) {
      return `lateral is ${g.lat.toFixed(3)} g at the ideal speed ` +
             `(${vIdeal.toFixed(2)} m/s), expected about 0`;
    }
    // All of it goes vertical: 1/cos(45) = sqrt(2).
    const expect = 1 / Math.cos(RC.BANK_ANGLE);
    if (Math.abs(g.vert - expect) / expect > 0.03) {
      return `vertical is ${g.vert.toFixed(3)} g, expected ${expect.toFixed(3)}`;
    }
  });

  check('a crest lightens the riders and a dip presses them down', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 8, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (const id of ['flat-to-gentle-up', 'gentle-up-to-flat', 'flat-to-gentle-down',
                      'gentle-down', 'gentle-down-to-flat', 'flat-to-gentle-up',
                      'gentle-up-to-flat']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    const pts = RC.trackPath().pts;
    let crest = pts[0], dip = pts[0];
    for (const p of pts) {
      if (p.z > crest.z) crest = p;
      if (p.z < dip.z) dip = p;
    }
    const vCrest = RC.gForces(RC.pathAt(crest.s, false), 12, 0).vert;
    const vDip = RC.gForces(RC.pathAt(dip.s, false), 12, 0).vert;
    if (!(vCrest < 1)) return `crest gives ${vCrest.toFixed(3)} g, expected under 1`;
    if (!(vDip > 1)) return `dip gives ${vDip.toFixed(3)} g, expected over 1`;
  });

  check('the recorded trace agrees with the energy at every sample', () => {
    // The graph and bars are drawn straight from these numbers, so if a
    // sample can disagree with the physics the display can lie.
    const err = buildTestCircuit();
    if (err) return err;
    RC.sim.cars = 3;
    RC.sim.friction = true;
    RC.resetSim(13);
    if (RC.sim.trace.length !== 0) return 'trace was not cleared on reset';
    runFor(8);

    const tr = RC.sim.trace;
    if (tr.length < 20) return `only ${tr.length} samples recorded`;
    for (let n = 0; n < tr.length; n++) {
      const p = tr[n];
      if (p.ke < -1e-9) return `sample ${n} has negative kinetic energy`;
      if (p.th < -1e-9) return `sample ${n} has negative thermal energy`;
      if (!near(p.ke + p.pe + p.th, p.total, 1e-6)) {
        return `sample ${n}: components sum to ${(p.ke + p.pe + p.th).toFixed(2)} ` +
               `but total says ${p.total.toFixed(2)}`;
      }
      if (Math.abs(p.total - p.supplied) / Math.max(1, p.supplied) > 0.01) {
        return `sample ${n}: total ${p.total.toFixed(1)} J vs supplied ${p.supplied.toFixed(1)} J`;
      }
      if (n > 0 && p.t < tr[n - 1].t) return `time goes backwards at sample ${n}`;
    }
    RC.sim.friction = false;
  });

  check('thermal energy only ever grows', () => {
    const err = buildTestCircuit();
    if (err) return err;
    RC.sim.cars = 3;
    RC.sim.friction = true;
    RC.resetSim(13);
    runFor(8);
    const tr = RC.sim.trace;
    for (let n = 1; n < tr.length; n++) {
      if (tr[n].th < tr[n - 1].th - 1e-9) {
        return `heat went down at sample ${n}: ${tr[n - 1].th.toFixed(2)} -> ${tr[n].th.toFixed(2)}`;
      }
    }
    if (!(tr[tr.length - 1].th > 0)) return 'friction was on but nothing was lost to heat';
    RC.sim.friction = false;
  });

  check('train length changes the effective slope (mean over cars)', () => {
    // A long train straddling a crest still has cars on the climb behind it,
    // so it feels a slope the lead car alone does not. This is the whole
    // reason the physics averages over cars rather than tracking one point.
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 0, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    // Six flat pieces of run-up, so a six-car train fits behind the crest
    // without any car being clamped at s = 0.
    const seq = new Array(6).fill('flat').concat(
      ['flat-to-gentle-up', 'gentle-up', 'gentle-up-to-flat',
       'flat-to-gentle-down', 'gentle-down', 'gentle-down-to-flat']);
    for (const id of seq) {
      if (!RC.place(id)) return `${id} refused`;
    }
    const path = RC.trackPath();

    // The crest is the highest path point.
    let crest = path.pts[0];
    for (const p of path.pts) if (p.z > crest.z) crest = p;
    if (crest.s < 6 * RC.CAR_SPACING) {
      return `crest at ${crest.s.toFixed(1)} m is too close to the start`;
    }

    RC.sim.friction = false;
    const mean = a => a.reduce((t, c) => t + c.dzds, 0) / a.length;

    RC.sim.cars = 1;
    RC.resetSim(crest.s);
    const one = RC.carStates();
    if (one.length !== 1) return `expected 1 car, got ${one.length}`;

    RC.sim.cars = 6;
    RC.resetSim(crest.s);
    const six = RC.carStates();
    if (six.length !== 6) return `expected 6 cars, got ${six.length}`;
    if (six.some(c => c.s <= 0)) return 'a car was clamped at the start of the track';

    // The lead car sits on the crest, so it feels essentially nothing.
    if (Math.abs(mean(one)) > 0.05) {
      return `lead car at the crest feels slope ${mean(one).toFixed(4)}, expected ~0`;
    }
    // The six-car train still has cars on the climb, so it feels the hill.
    if (Math.abs(mean(six)) < 0.05) {
      return `six-car mean slope ${mean(six).toFixed(4)} — train length had no effect`;
    }
    RC.sim.cars = 4;
  });

  check('car orientation frame is orthonormal and pitches with the track', () => {
    RC.track.pieces = [];
    RC.track.start = { i: 6, j: 20, dir: 0, k: 10, g: 0 };
    RC.track.head = Object.assign({}, RC.track.start);
    RC.version++;
    for (const id of ['flat', 'flat-to-gentle-down', 'gentle-down', 'gentle-down',
                      'gentle-down-to-flat', 'flat']) {
      if (!RC.place(id)) return `${id} refused`;
    }
    const path = RC.trackPath();
    const dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z;
    const len = a => Math.hypot(a.x, a.y, a.z);

    let sawPitch = false, sawFlat = false;
    for (let s = 0.5; s < path.total - 0.5; s += 0.5) {
      const p = RC.pathAt(s, false);
      const fr = RC.carFrame(p);

      for (const [name, v] of [['f', fr.f], ['r', fr.r], ['u', fr.u]]) {
        if (!near(len(v), 1, 1e-6)) return `${name} is not unit length at s=${s} (${len(v).toFixed(5)})`;
      }
      if (!near(dot(fr.f, fr.r), 0, 1e-6)) return `f and r not perpendicular at s=${s}`;
      if (!near(dot(fr.f, fr.u), 0, 1e-6)) return `f and u not perpendicular at s=${s}`;
      if (!near(dot(fr.r, fr.u), 0, 1e-6)) return `r and u not perpendicular at s=${s}`;
      if (fr.r.z !== 0) return `r should stay horizontal, got z=${fr.r.z} at s=${s}`;
      if (fr.u.z <= 0) return `u should point upwards, got z=${fr.u.z} at s=${s}`;

      // On the gentle slope the car must actually be tilted.
      if (Math.abs(fr.f.z) > 0.4) {
        sawPitch = true;
        if (fr.u.z > 0.95) return `car is not tilted at s=${s}: u.z=${fr.u.z.toFixed(4)}`;
      }
      if (Math.abs(fr.f.z) < 1e-6) {
        sawFlat = true;
        if (!near(fr.u.z, 1, 1e-6)) return `car should be level on flat track at s=${s}`;
      }
    }
    if (!sawPitch) return 'never found a sloped section to check';
    if (!sawFlat) return 'never found a flat section to check';
  });

  /* ---- report ---------------------------------------------------------- */
  const ul = document.getElementById('results');
  let failed = 0;
  for (const r of results) {
    if (!r.ok) failed++;
    const li = document.createElement('li');
    li.className = r.ok ? 'pass' : 'fail';
    li.textContent = r.name;
    if (!r.ok) {
      const d = document.createElement('span');
      d.className = 'detail';
      d.textContent = r.detail;
      li.appendChild(d);
    }
    ul.appendChild(li);
  }
  const sum = document.getElementById('summary');
  sum.className = failed ? 'anyfail' : 'allpass';
  sum.textContent = failed
    ? `${failed} of ${results.length} checks FAILED`
    : `All ${results.length} checks passed`;

  RC.resetTrack();
})();
</script>
</body>
</html>
